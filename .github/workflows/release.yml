name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (must match ## Version: in .toc, e.g. 1.2.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create Release Package
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Version in TOC
        run: |
          VERSION="${{ github.event.inputs.version }}"
          TOC_VERSION=$(grep "^## Version:" ProfessionHelper.toc | sed 's/## Version: //')
          if [ "$TOC_VERSION" != "$VERSION" ]; then
            echo "❌ Version mismatch! TOC has '$TOC_VERSION', input is '$VERSION'"
            exit 1
          fi
          echo "✅ Version validated: $VERSION"

      - name: Create Package Directory
        run: |
          mkdir -p package/ProfessionHelper
          echo "📦 Package directory created"

      - name: Copy Addon Files
        run: |
          # Copy Lua files
          cp *.lua package/ProfessionHelper/ 2>/dev/null || true
          
          # Copy TOC file
          cp *.toc package/ProfessionHelper/
          
          # Copy documentation
          cp LICENSE package/ProfessionHelper/
          cp README.md package/ProfessionHelper/
          cp CHANGELOG.md package/ProfessionHelper/
          
          # Copy directories
          cp -r Locales package/ProfessionHelper/
          cp -r Data package/ProfessionHelper/
          
          echo "✅ Files copied successfully"

      - name: List Package Contents
        run: |
          echo "📋 Package contents:"
          find package/ProfessionHelper -type f | sort

      - name: Create ZIP Archive
        run: |
          VERSION="${{ github.event.inputs.version }}"
          cd package
          zip -r ../ProfessionHelper-v${VERSION}.zip ProfessionHelper/
          cd ..
          echo "✅ ZIP created: ProfessionHelper-v${VERSION}.zip"
          ls -lh ProfessionHelper-v${VERSION}.zip

      - name: Generate Changelog
        id: changelog
        run: |
          VERSION="${{ github.event.inputs.version }}"
          CHANGELOG=$(sed -n "/^## \[${VERSION}\]/,/^## \[/p" CHANGELOG.md | sed '$d')
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="Release version ${VERSION}"
          fi
          echo "$CHANGELOG" > release_notes.md
          echo "📝 Changelog generated"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          files: ProfessionHelper-v${{ github.event.inputs.version }}.zip
          body_path: release_notes.md
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to CurseForge
        continue-on-error: true
        if: ${{ secrets.CURSEFORGE_PROJECT_ID != '' && secrets.CURSEFORGE_TOKEN != '' }}
        uses: itsmeow/curseforge-upload@v3
        with:
          token: ${{ secrets.CURSEFORGE_TOKEN }}
          project_id: '1520857'
          game_endpoint: wow
          file_path: ProfessionHelper-v${{ github.event.inputs.version }}.zip
          changelog_type: markdown
          display_name: Profession Helper v${{ github.event.inputs.version }}
          game_versions: '11302,11303'
          release_type: release

      - name: Upload to WoWInterface
        continue-on-error: true
        run: |
          VERSION="${{ github.event.inputs.version }}"
          curl -X POST "https://api.wowinterface.com/addons/update" \
            -H "x-api-token: ${{ secrets.WOWI_API_TOKEN }}" \
            -F "id=YOUR_ADDON_ID" \
            -F "version=${VERSION}" \
            -F "updatefile=@ProfessionHelper-v${VERSION}.zip" \
            -F "changelog=$(cat release_notes.md)"
          echo "✅ Uploaded to WoWInterface"

      - name: Publish Summary
        run: |
          VERSION="${{ github.event.inputs.version }}"
          echo "## 🎉 Release v${VERSION} Published!" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Published to:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ GitHub Releases" >> $GITHUB_STEP_SUMMARY
          echo "- ⚙️ CurseForge (if token configured)" >> $GITHUB_STEP_SUMMARY
          echo "- ⚙️ WoWInterface (if token configured)" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Download:" >> $GITHUB_STEP_SUMMARY
          echo "[ProfessionHelper-v${VERSION}.zip](https://github.com/${{ github.repository }}/releases/download/v${VERSION}/ProfessionHelper-v${VERSION}.zip)" >> $GITHUB_STEP_SUMMARY
