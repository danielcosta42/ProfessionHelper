name: Release & Publish

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v1.1.0, etc.

jobs:
  release:
    name: Create Release Package
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog

      - name: Get Version from Tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Validate Version in TOC
        run: |
          TOC_VERSION=$(grep "^## Version:" ProfessionHelper.toc | sed 's/## Version: //')
          if [ "$TOC_VERSION" != "${{ steps.get_version.outputs.version }}" ]; then
            echo "❌ Version mismatch!"
            echo "Tag version: ${{ steps.get_version.outputs.version }}"
            echo "TOC version: $TOC_VERSION"
            exit 1
          fi
          echo "✅ Version validated: $TOC_VERSION"

      - name: Create Package Directory
        run: |
          mkdir -p package/ProfessionHelper
          echo "📦 Package directory created"

      - name: Copy Addon Files
        run: |
          # Copy Lua files
          cp *.lua package/ProfessionHelper/ 2>/dev/null || true
          
          # Copy TOC file
          cp *.toc package/ProfessionHelper/
          
          # Copy documentation
          cp LICENSE package/ProfessionHelper/
          cp README.md package/ProfessionHelper/
          cp CHANGELOG.md package/ProfessionHelper/
          
          # Copy directories
          cp -r Locales package/ProfessionHelper/
          cp -r Data package/ProfessionHelper/
          
          echo "✅ Files copied successfully"

      - name: List Package Contents
        run: |
          echo "📋 Package contents:"
          find package/ProfessionHelper -type f | sort

      - name: Create ZIP Archive
        run: |
          cd package
          zip -r ../ProfessionHelper-${{ steps.get_version.outputs.tag }}.zip ProfessionHelper/
          cd ..
          echo "✅ ZIP created: ProfessionHelper-${{ steps.get_version.outputs.tag }}.zip"
          ls -lh ProfessionHelper-${{ steps.get_version.outputs.tag }}.zip

      - name: Generate Changelog
        id: changelog
        run: |
          # Extract changelog for this version
          CHANGELOG=$(sed -n "/^## \[${{ steps.get_version.outputs.version }}\]/,/^## \[/p" CHANGELOG.md | sed '$d')
          
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="Release version ${{ steps.get_version.outputs.version }}"
          fi
          
          # Save to file for GitHub Release
          echo "$CHANGELOG" > release_notes.md
          echo "📝 Changelog generated"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ProfessionHelper-${{ steps.get_version.outputs.tag }}.zip
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to CurseForge
        if: ${{ secrets.CURSEFORGE_TOKEN != '' }}
        uses: itsmeow/curseforge-upload@v3
        with:
          token: ${{ secrets.CURSEFORGE_TOKEN }}
          project_id: '000000'  # Replace with your CurseForge project ID
          game_endpoint: wow
          file_path: ProfessionHelper-${{ steps.get_version.outputs.tag }}.zip
          changelog: |
            ${{ steps.changelog.outputs.changelog }}
          changelog_type: markdown
          display_name: Profession Helper ${{ steps.get_version.outputs.version }}
          game_versions: '11302,11303'  # TBC Classic versions
          release_type: release

      - name: Upload to WoWInterface
        if: ${{ secrets.WOWI_API_TOKEN != '' }}
        run: |
          # WoWInterface API upload
          curl -X POST "https://api.wowinterface.com/addons/update" \
            -H "x-api-token: ${{ secrets.WOWI_API_TOKEN }}" \
            -F "id=YOUR_ADDON_ID" \
            -F "version=${{ steps.get_version.outputs.version }}" \
            -F "updatefile=@ProfessionHelper-${{ steps.get_version.outputs.tag }}.zip" \
            -F "changelog=$(cat release_notes.md)"
          echo "✅ Uploaded to WoWInterface"

      - name: Publish Summary
        run: |
          echo "## 🎉 Release Published!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.get_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ steps.get_version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Published to:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ GitHub Releases" >> $GITHUB_STEP_SUMMARY
          
          if [ -n "${{ secrets.CURSEFORGE_TOKEN }}" ]; then
            echo "- ✅ CurseForge" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⏭️ CurseForge (token not configured)" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -n "${{ secrets.WOWI_API_TOKEN }}" ]; then
            echo "- ✅ WoWInterface" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⏭️ WoWInterface (token not configured)" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Download:" >> $GITHUB_STEP_SUMMARY
          echo "[ProfessionHelper-${{ steps.get_version.outputs.tag }}.zip](https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.tag }}/ProfessionHelper-${{ steps.get_version.outputs.tag }}.zip)" >> $GITHUB_STEP_SUMMARY
