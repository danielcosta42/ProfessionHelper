name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # ── 1. Validate ───────────────────────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Lua
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.1"

      - name: Check Lua syntax
        run: |
          echo "🔍 Checking Lua syntax..."
          ERRORS=0
          for file in $(find . -type f -name "*.lua" ! -path "./.lua/*" ! -path "./.luarocks/*"); do
            if ! luac -p "$file" > /dev/null 2>&1; then
              echo "❌ Syntax error in: $file"
              luac -p "$file"
              ERRORS=$((ERRORS + 1))
            fi
          done
          [ $ERRORS -eq 0 ] && echo "✅ All Lua files OK" || exit 1

      - name: Check TOC fields
        run: |
          for field in "## Interface:" "## Title:" "## Version:" "## Author:"; do
            grep -q "^$field" ProfessionHelper.toc || { echo "❌ Missing: $field"; exit 1; }
          done
          echo "✅ TOC validated"

      - name: Check required files
        run: |
          for f in ProfessionHelper.toc Core.lua UI.lua LICENSE README.md CHANGELOG.md; do
            [ -f "$f" ] || { echo "❌ Missing: $f"; exit 1; }
          done
          echo "✅ All required files present"

  # ── 2. Release (only on push to main, not PRs) ───────────────────────────────
  release:
    name: Release & Publish
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install semantic-release
        run: |
          npm install -g \
            semantic-release \
            @semantic-release/git \
            @semantic-release/changelog \
            @semantic-release/exec \
            @semantic-release/github \
            conventional-changelog-conventionalcommits

      - name: Get current version
        id: before
        run: |
          echo "version=$(grep '^## Version:' ProfessionHelper.toc | sed 's/## Version: //')" >> $GITHUB_OUTPUT

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          WOWI_API_TOKEN: ${{ secrets.WOWI_API_TOKEN }}
        run: npx semantic-release

      - name: Get new version
        id: after
        run: |
          echo "version=$(grep '^## Version:' ProfessionHelper.toc | sed 's/## Version: //')" >> $GITHUB_OUTPUT

      - name: Summary
        run: |
          BEFORE="${{ steps.before.outputs.version }}"
          AFTER="${{ steps.after.outputs.version }}"
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "## ✅ Released v$AFTER" >> $GITHUB_STEP_SUMMARY
            echo "**Previous:** v$BEFORE → **New:** v$AFTER" >> $GITHUB_STEP_SUMMARY
            echo "### 📦 Published to:" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ GitHub Releases" >> $GITHUB_STEP_SUMMARY
            echo "- ⚙️ CurseForge (if token configured)" >> $GITHUB_STEP_SUMMARY
            echo "- ⚙️ WoWInterface (if token configured)" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ℹ️ No release — no releasable commits." >> $GITHUB_STEP_SUMMARY
            echo "Use \`feat:\` or \`fix:\` prefixes to trigger a release." >> $GITHUB_STEP_SUMMARY
          fi
